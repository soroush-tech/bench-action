name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      # --ignore-scripts: no dependency here needs lifecycle scripts (esbuild's
      # binary arrives via optionalDependencies), so don't let any run.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      # dist/ and vendor/ are gitignored and produced by the Release workflow
      # at release time — these are smoke tests that the bundle still compiles
      # and the pinned bench package still vendors cleanly.
      - name: Build
        run: npm run build

      # vendor.mjs itself fails loudly if the package or either file is
      # missing — no extra existence checks needed here.
      - name: Vendor smoke test
        run: npm run vendor
