name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      # dist/ is gitignored and built by the Release workflow at release time
      # — this build is a smoke test that the bundle still compiles.
      - name: Build
        run: npm run build
