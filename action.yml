name: 'soroush-bench'
description: 'Run *.bench.ts benchmarks in a CPU/RAM-pinned Docker sandbox, fail below a minimum speed ratio, and comment results on the PR'
author: 'soroush-tech'
branding:
  icon: 'zap'
  color: 'green'
inputs:
  bench-dir:
    description: 'Directory containing *.bench.ts files, relative to the workspace root'
    required: true
  files:
    description: 'Optional newline- or comma-separated subset of file names (with or without the .bench.ts suffix) to run instead of every file in bench-dir'
    required: false
    default: ''
  baseline-case:
    description: 'Case key every other case is compared against'
    required: true
  min-ratio:
    description: 'Minimum speed vs the baseline, in percent (e.g. 80); any case below it fails the action'
    required: true
  rounds:
    description: 'Repeat each suite N times and gate on the median per case (recommended on shared runners)'
    required: false
    default: ''
  cpus:
    description: 'Sandbox CPU quota (docker --cpus)'
    required: false
    default: ''
  cpuset:
    description: 'Logical CPU(s) to pin the sandbox to (docker --cpuset-cpus)'
    required: false
    default: ''
  memory:
    description: 'Sandbox memory cap (docker --memory; swap is pinned to the same)'
    required: false
    default: ''
  branded:
    description: 'Post the PR comment through the bench relay as the bench bot (requires the public bench GitHub App installed on the repo and id-token: write on the job); any relay failure falls back to github-token. Set to false to always comment directly'
    required: false
    default: 'true'
  github-token:
    description: 'Token for the PR results comment when branded posting is unavailable. Defaults to the workflow runtime token; pass a GitHub App token to brand the fallback comment, or an empty string to skip commenting'
    required: false
    default: ${{ github.token }}
outputs:
  report:
    description: 'The combined markdown report (also posted as the PR comment)'
runs:
  using: 'node24'
  main: 'dist/index.cjs'
